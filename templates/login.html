{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block body %}
<main class="min-h-screen flex items-center justify-center px-4 py-10">
  <section class="w-full max-w-sm rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
    <div class="mb-6">
      <h1 class="text-xl font-semibold">Admin Login</h1>
      <p class="mt-1 text-sm text-zinc-600">YouTube live streaming manager</p>
    </div>
    {% if error %}
      <div class="mb-4 rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <label class="block">
        <span class="text-sm font-medium">Username</span>
        <input name="username" autocomplete="username" required class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2 outline-none focus:border-zinc-800">
      </label>
      <label class="block">
        <span class="text-sm font-medium">Password</span>
        <input name="password" type="password" autocomplete="current-password" required class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2 outline-none focus:border-zinc-800">
      </label>
      <button class="w-full rounded-md bg-zinc-900 px-4 py-2 font-medium text-white hover:bg-zinc-700" type="submit">Sign in</button>
    </form>
  </section>
</main>
{% endblock %}
